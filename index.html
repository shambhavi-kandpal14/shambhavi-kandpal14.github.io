<!DOCTYPE html>
<html>
<head>
    <title>Shambhavi Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* 🌈 BACKGROUND FIX */
            background: linear-gradient(-45deg, #0f172a, #1e293b, #6366f1, #0ea5e9);
            background-size: 400% 400%;
            animation: bg 12s ease infinite;
            color: white;
        }

        @keyframes bg {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 40px;
        }

        h1 {
            text-align: center;
        }

        h3 {
            text-align: center;
            opacity: 0.8;
        }

        .card {
            background: rgba(255,255,255,0.12);
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h2 {
            border-left: 4px solid #38bdf8;
            padding-left: 10px;
        }

        p {
            color: #e5e7eb;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Shambhavi Kandpal</h1>
    <h3>Aspiring AI & Computer Science Student</h3>

    <div class="card">
        <h2>About Me</h2>
        <p>I am a 12th-grade student passionate about Artificial Intelligence and Computer Science.</p>
    </div>

    <div class="card">
        <h2>Skills</h2>
        <p>Python, HTML, Machine Learning Interest</p>
    </div>

</div>

</body>
</html>
